---
grafana:
  adminPassword: devadmin
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

prometheus:
  prometheusSpec:
    retention: 24h
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "200m"
        memory: "256Mi"
    alerting:
      alertmanagers:
        - namespace: monitoring-dev
          name: alertmanager
          port: web

prometheusRule:
  groups:
    - name: node-alerts
      rules:
        - alert: HighCPU
          expr: sum(rate(container_cpu_usage_seconds_total[5m])) > 0.8
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"

alertmanager:
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

loki:
  persistence:
    enabled: false
  config:
    table_manager:
      retention_deletes_enabled: true
      retention_period: 24h
